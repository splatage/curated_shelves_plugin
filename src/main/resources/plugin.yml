name: CuratedShelves
version: '${version}'
main: com.splatage.curatedshelves.CuratedShelvesPlugin
description: Plugin-managed curated library shelves for Paper/Folia.
author: Jonathan Melville
website: https://github.com/splatage
api-version: '1.21.11'
folia-supported: true
libraries:
  - com.zaxxer:HikariCP:6.3.2
  - com.mysql:mysql-connector-j:9.6.0

commands:
  library:
    description: Manage CuratedShelves library shelves.
    usage: /library <mark|unmark|reload|browse>

permissions:
  curatedshelves.use:
    description: Use Library Shelves.
    default: true
  curatedshelves.librarian.remove.any:
    description: Remove any stored library book.
    default: op
  curatedshelves.admin.mark:
    description: Mark a shelf as a Library Shelf.
    default: op
  curatedshelves.admin.unmark:
    description: Unmark an empty Library Shelf.
    default: op
  curatedshelves.admin.reload:
    description: Reload CuratedShelves configuration.
    default: op
  curatedshelves.admin.browse:
    description: Browse and moderate curated Library Shelves from the central GUI.
    default: op
  curatedshelves.admin.edit:
    description: Edit curated Library Shelves from the central GUI and remove any stored book.
    default: op
