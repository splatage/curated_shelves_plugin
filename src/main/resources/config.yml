rows: 1
author-must-deposit: false
author-can-remove-own-book: false

storage:
  # Supported values: sqlite, mysql
  type: sqlite

  # Optional prefix applied to Curated Shelves tables.
  # Example: wild_
  table-prefix: ''

  sqlite:
    # File name inside the plugin data folder.
    file: library.db

  mysql:
    host: localhost
    port: 3306
    database: curated_shelves
    username: root
    password: ''
    maximum-pool-size: 10
    connection-timeout-millis: 10000
